services:
  - type: web
    name: revia-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: APP_ACCESS_CODE
        sync: false
      - key: PUBLIC_ACCESS_ENABLED
        value: "true"
      - key: SESSION_SIGNING_KEY
        sync: false
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: AI_MODE
        value: live
      - key: AI_PROVIDER
        value: deepseek
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: FILE_STORAGE_ROOT
        value: /tmp/revia
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "false"
      - key: UPLOAD_URL_EXPIRES_SECONDS
        value: "900"
      - key: DOCUMENT_LEASE_SECONDS
        value: "300"
      - key: AI_TIMEOUT_SECONDS
        value: "60"
      - key: AI_MAX_OUTPUT_TOKENS
        value: "4096"
      - key: AI_TEMPERATURE
        value: "0.1"
      - key: MATCHING_THRESHOLD
        value: "0.35"
      - key: MATCHING_MAX_CANDIDATES
        value: "3"
      - key: OCR_ENABLED
        value: "true"
      - key: OCR_DPI
        value: "144"
      - key: OCR_MINIMUM_TEXT_LENGTH
        value: "8"
      - key: OCR_WORKER_MAX_RSS_MB
        value: "300"
      - key: OCR_WORKER_THREADS
        value: "1"
      - key: OCR_WORKER_TIMEOUT_SECONDS
        value: "180"
      - key: DOCUMENT_MEMORY_DIAGNOSTICS_ENABLED
        value: "true"
      - key: MAX_UPLOAD_MB
        value: "150"
      - key: MAX_PDF_PAGES
        value: "600"
      - key: WORKSPACE_MAX_ACTIVE_DOCUMENTS
        value: "1"
      - key: WORKSPACE_ROLLING_24H_PAGE_LIMIT
        value: "1200"
      - key: GLOBAL_MAX_PROCESSING_DOCUMENTS
        value: "1"
      - key: GLOBAL_ROLLING_24H_PAGE_LIMIT
        value: "3000"
